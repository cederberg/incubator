name: publish-outliner

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
        working-directory: outliner
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: outliner/dist
